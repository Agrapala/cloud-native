version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=password
      - DB_NAME=coursesdb
      - DB_PORT=5433
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SQS_URL=${SQS_URL}
    depends_on:
      - postgres
      - redis

  worker:
    build: ./worker
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=password
      - DB_NAME=coursesdb
      - DB_PORT=5433
      - SQS_URL=${SQS_URL}
      - SNS_TOPIC=${SNS_TOPIC}
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coursesdb
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"